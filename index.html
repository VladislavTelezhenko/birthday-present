<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С днем рождения!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(-45deg, #0d0221, #1a0a38, #0a1830, #1e0d3a, #07122a, #180535);
      background-size: 400% 400%;
      animation: bgShift 18s ease infinite;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    #stars     { z-index: 0; }
    #fireworks { z-index: 1; }
    #confetti  { z-index: 2; }

    /* ── Password screen ── */
    #gate {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-box {
      background: rgba(15, 5, 35, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .gate-emoji { font-size: 3rem; margin-bottom: 16px; }

    .gate-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .gate-sub {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .gate-input {
      width: 100%;
      padding: 13px 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .gate-input:focus { border-color: rgba(255,215,0,0.5); }

    .gate-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, #7b2ff7, #4a6cf7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .gate-btn:hover { opacity: 0.85; }

    .gate-error {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 12px;
      min-height: 20px;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }

    .shake { animation: shake 0.4s ease; }

    #gate.hidden {
      animation: fadeOut 0.6s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; pointer-events: none; }
    }

    /* ── Main content ── */
    .container {
      position: relative;
      z-index: 10;
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }

    .header {
      text-align: center;
      margin-bottom: 56px;
    }

    .header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #ff6b6b, #ffd700, #ff6bff, #6bffff, #ffd700, #ff6b6b);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* ── Cards grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 28px;
    }

    @media (max-width: 580px) {
      .cards-grid { grid-template-columns: 1fr; }
    }

    /* ── Flip card ── */
    .card-wrapper {
      perspective: 1200px;
      height: 340px;
    }

    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
      cursor: pointer;
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      overflow: hidden;
    }

    /* ── Front ── */
    .card-front {
      background: #13132a;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
    }

    .card-front:hover { border-color: rgba(255,215,0,0.25); }

    .cover {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .cover img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── Back ── */
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #1a0a38 0%, #0a1830 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px 20px;
      text-align: center;
      border: 1px solid rgba(255,215,0,0.25);
    }

    .back-text {
      color: rgba(255,255,255,0.9);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .key-block {
      width: 100%;
      background: rgba(255,215,0,0.07);
      border: 1px solid rgba(255,215,0,0.25);
      border-radius: 12px;
      padding: 12px 16px;
    }

    .key-value {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 2px;
      user-select: all;
    }

    .copy-btn {
      margin-top: 10px;
      padding: 7px 18px;
      background: rgba(255,215,0,0.12);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 8px;
      color: #ffd700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: rgba(255,215,0,0.25); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="fireworks"></canvas>
<canvas id="confetti"></canvas>

<!-- Password gate -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-emoji">🎁</div>
    <div class="gate-title">Здесь твой подарок</div>
    <div class="gate-sub">Введи кодовое слово, чтобы открыть</div>
    <input class="gate-input" id="pwInput" type="password" placeholder="••••••••••••••" autocomplete="off">
    <button class="gate-btn" onclick="unlock()">Открыть →</button>
    <div class="gate-error" id="pwError"></div>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>🎂 С днем рождения, братик! 🎂</h1>
  </div>
  <div class="cards-grid" id="grid"></div>
</div>

<script>
  /* ── Encrypted card data ── */
  const SALT = 'bday-gift-2024';

  const CARDS = [
    {
      title: 'Days Gone',
      cover: 'https://cdn.cloudflare.steamstatic.com/steam/apps/1259420/library_600x900.jpg',
      gradient: 'linear-gradient(135deg, #2d5a1b 0%, #0d1f0a 100%)',
      eg: 'd7D9khSWpO14C06r+vi5lyIwCNMyGkaZx9/9NVvHASSGiDTErSsyeMdW98tN7qDqnve8w618bom2WG/ZV7dcaSXJ/DDW0A1wQH+aNX+ld9yKay/tkD+fqoGJHrp7jFFsDYHbgdzCIKp7W4Y4AHAKOCVp29fJrEwuIJrBHMXTb0dXQtPKl8t+OFdhgzM2wq7tmlgyd4ZhpAIuVSE+Edtcr2Z0+bO5pMLqAA+KaDVwKF8HVeKFDfAhUEkU7AA69nsiFOEqNklq',
      ek: 'CYGsemT7EndQv1Ho0/ZpCakoYzQRFZMuET3oGVF+Vf3mIQcCZQ2G1+B6PJGB'
    },
    {
      title: 'Stray',
      cover: 'https://cdn.cloudflare.steamstatic.com/steam/apps/1332010/library_600x900.jpg',
      gradient: 'linear-gradient(135deg, #3d1a6b 0%, #0f0824 100%)',
      eg: 'FkhWeuBlLY6hRcnk8AhXRj3MrgMbOzU95tQ6dahygXBS7xU945Yv1ydImAbo7wsUqJ1u7RfqQi/tWG+9B8Qyid+4mXABsFN07Q0NHPj2bR/kk3EgQtwAiUCIjZu/vwf4ewogTiIT5qqT0rBQW4t/+koCdqlOrWD1nIEfyXI3MSAzHUUHOMnZj7khCSXteJMMMD06lALI1zi2/aKs',
      ek: '9Ymz+ScNin0xFp7B+dkp7dO6tnn2Bii1/Td+njr3JrWugO1gld2DKdYVPtzJ'
    },
    {
      title: 'DEATH STRANDING',
      cover: 'https://cdn.cloudflare.steamstatic.com/steam/apps/1850570/library_600x900.jpg',
      gradient: 'linear-gradient(135deg, #0d3a4f 0%, #05121a 100%)',
      eg: 'Sd5uWCkiYjP4oQPKh2fHjB5+91jwTLlsoBzyYcPO5qMFJNkZs8/v7jBEb/quCeBWUxApbqd0d6s+ptGof1Q5ClIO2meqh/afeVdCJJA9N4GJgSzsm8vR7NNpZLcKvEPE27w5N7DhhAzvYqFeXaOBe3dHd6nj501CRCG2C41Nf5nrAEJR0YX9EdBI5bEfVpE=',
      ek: 'lz+gBf2F4v4EICr18VX9bbrDjiemnqi84I1nEvZa+lmU6swuouElo38VthtE'
    },
    {
      title: "No Man's Sky",
      cover: 'https://cdn.cloudflare.steamstatic.com/steam/apps/275850/library_600x900.jpg',
      gradient: 'linear-gradient(135deg, #0d1f5e 0%, #05081f 100%)',
      eg: 'DBcYRbOQlxVy+mcM2ZLRmpcWhQfMIASy69doloaIpZtcGojTXFDaLO9FMnJyKtaP4+GpQLuWNApd75zQkQ9wEJybgn2NopflfG3uL5m8ZSmurdholHhRJ5txOKIBA4W2Ko1kzpBUKP7zqXeWySSKgHD3KdTTCIZ8bpnSB5uHy7Bs8a4n9CVG9NWJiYMzl2LwN0kLLuHOUJCJMA==',
      ek: '9iD15wIv53t0x+dhSdj7X55LMuCB3RCl+pwQBs56SMzg2K8O8M8JdZySXPE8'
    }
  ];

  /* ── Crypto helpers ── */
  async function deriveKey(password, usage) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: enc.encode(SALT), iterations: 100000, hash: 'SHA-256' },
      km,
      { name: 'AES-GCM', length: 256 },
      false,
      [usage]
    );
  }

  async function decrypt(b64, key) {
    const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const pt  = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, key, buf.slice(12));
    return new TextDecoder().decode(pt);
  }

  /* ── Password gate ── */
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });

  async function unlock() {
    const pw  = document.getElementById('pwInput').value;
    const err = document.getElementById('pwError');
    err.textContent = '';

    try {
      const key = await deriveKey(pw, 'decrypt');
      const greeting0 = await decrypt(CARDS[0].eg, key);

      /* Password correct — decrypt all and render */
      const decrypted = await Promise.all(
        CARDS.map(async c => ({
          greeting: await decrypt(c.eg, key),
          key:      await decrypt(c.ek, key)
        }))
      );

      renderCards(decrypted);
      document.getElementById('gate').classList.add('hidden');
      setTimeout(() => document.getElementById('gate').remove(), 700);

    } catch {
      err.textContent = 'Неверный пароль';
      const box = document.querySelector('.gate-box');
      box.classList.remove('shake');
      void box.offsetWidth;
      box.classList.add('shake');
    }
  }

  /* ── Render cards after unlock ── */
  function renderCards(decrypted) {
    const grid = document.getElementById('grid');
    CARDS.forEach((g, i) => {
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = `
        <div class="card" id="card${i}">
          <div class="card-face card-front" onclick="flip(${i})">
            <div class="cover" style="background:${g.gradient}">
              <img src="${g.cover}" alt="${g.title}">
            </div>
          </div>
          <div class="card-face card-back" onclick="flip(${i})">
            <div class="back-text">${decrypted[i].greeting.replace(/\n/g,'<br>')}</div>
            <div class="key-block">
              <div class="key-value" id="key${i}">${decrypted[i].key}</div>
              <button class="copy-btn" onclick="copyKey(event,${i})">📋 Скопировать</button>
            </div>
          </div>
        </div>
      `;
      grid.appendChild(wrapper);
    });
  }

  function flip(i) {
    document.getElementById('card' + i).classList.toggle('flipped');
  }

  function copyKey(e, i) {
    e.stopPropagation();
    navigator.clipboard.writeText(document.getElementById('key' + i).textContent);
    const btn = e.target;
    btn.textContent = '✅ Скопировано!';
    setTimeout(() => btn.textContent = '📋 Скопировать', 2000);
  }

  /* ── Canvas setup ── */
  const stC = document.getElementById('stars');
  const fwC = document.getElementById('fireworks');
  const cfC = document.getElementById('confetti');
  const stX = stC.getContext('2d');
  const fwX = fwC.getContext('2d');
  const cfX = cfC.getContext('2d');

  function resize() {
    stC.width = fwC.width = cfC.width = window.innerWidth;
    stC.height = fwC.height = cfC.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── Stars ── */
  const stars = Array.from({ length: 200 }, () => ({
    x: Math.random() * stC.width,
    y: Math.random() * stC.height,
    r: Math.random() * 1.4 + 0.2,
    alpha: Math.random(),
    speed: Math.random() * 0.012 + 0.004,
    dir: Math.random() > 0.5 ? 1 : -1
  }));

  function loopStars() {
    stX.clearRect(0, 0, stC.width, stC.height);
    stars.forEach(s => {
      s.alpha += s.speed * s.dir;
      if (s.alpha >= 1)    { s.alpha = 1;    s.dir = -1; }
      if (s.alpha <= 0.05) { s.alpha = 0.05; s.dir =  1; }
      stX.globalAlpha = s.alpha;
      stX.fillStyle = '#ffffff';
      stX.beginPath();
      stX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      stX.fill();
    });
    stX.globalAlpha = 1;
    requestAnimationFrame(loopStars);
  }

  /* ── Fireworks ── */
  const FW_COLORS = ['#ff6b6b','#ffd700','#ffffff','#6bffff','#ff6bff','#6bff6b','#ffaa6b'];

  class Spark {
    constructor(x, y, color) {
      this.x = x; this.y = y; this.color = color;
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 7 + 2;
      this.vx = Math.cos(a) * s;
      this.vy = Math.sin(a) * s;
      this.alpha = 1;
      this.decay = Math.random() * 0.018 + 0.008;
      this.r = Math.random() * 2 + 1;
    }
    tick() {
      this.x += this.vx; this.y += this.vy;
      this.vy += 0.12;   this.vx *= 0.99;
      this.alpha -= this.decay;
    }
    draw() {
      fwX.globalAlpha = Math.max(0, this.alpha);
      fwX.fillStyle = this.color;
      fwX.beginPath();
      fwX.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      fwX.fill();
    }
  }

  let sparks = [];

  function burst() {
    const x = fwC.width  * (0.1 + Math.random() * 0.8);
    const y = fwC.height * (0.05 + Math.random() * 0.55);
    const c = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
    for (let i = 0; i < 90; i++) sparks.push(new Spark(x, y, c));
  }

  function loopFW() {
    fwX.clearRect(0, 0, fwC.width, fwC.height);
    sparks = sparks.filter(s => s.alpha > 0);
    sparks.forEach(s => { s.tick(); s.draw(); });
    fwX.globalAlpha = 1;
    requestAnimationFrame(loopFW);
  }

  /* ── Confetti ── */
  const CF_COLORS = ['#ff6b6b','#ffd700','#6bff6b','#6b9fff','#ff6bff','#ffaa6b','#ffffff'];

  const flakes = Array.from({ length: 140 }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * -window.innerHeight,
    w: Math.random() * 10 + 4,
    h: Math.random() * 5 + 3,
    color: CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)],
    speed: Math.random() * 2.5 + 0.8,
    drift: (Math.random() - 0.5) * 1.2,
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - 0.5) * 0.12,
  }));

  function loopCF() {
    cfX.clearRect(0, 0, cfC.width, cfC.height);
    flakes.forEach(f => {
      cfX.save();
      cfX.translate(f.x, f.y);
      cfX.rotate(f.angle);
      cfX.fillStyle = f.color;
      cfX.globalAlpha = 0.85;
      cfX.fillRect(-f.w / 2, -f.h / 2, f.w, f.h);
      cfX.restore();
      f.y += f.speed; f.x += f.drift; f.angle += f.spin;
      if (f.y > cfC.height + 10) { f.y = -20; f.x = Math.random() * cfC.width; }
    });
    requestAnimationFrame(loopCF);
  }

  /* ── Start ── */
  loopStars();
  loopFW();
  loopCF();
  burst(); setTimeout(burst, 400); setTimeout(burst, 900);
  setInterval(burst, 1800);
</script>
</body>
</html>
